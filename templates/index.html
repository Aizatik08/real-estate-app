<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .container-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-weight: bold;
        }
        .btn-custom {
            background: #4CAF50;
            color: white;
        }
        .btn-custom:hover {
            background: #45a049;
        }
        img {
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="container-box">
        <h1 class="text-center mb-4">🏠 Предсказание цены недвижимости</h1>

        <form method="POST" class="row g-3">

            <div class="col-md-4">
                <input type="text" name="x0" class="form-control" placeholder="No">
            </div>

            <div class="col-md-4">
                <input type="text" name="x1" class="form-control" placeholder="Transaction date">
            </div>

            <div class="col-md-4">
                <input type="text" name="x2" class="form-control" placeholder="House age">
            </div>

            <div class="col-md-4">
                <input type="text" name="x3" class="form-control" placeholder="Distance to MRT">
            </div>

            <div class="col-md-4">
                <input type="text" name="x4" class="form-control" placeholder="Stores">
            </div>

            <div class="col-md-4">
                <input type="text" name="x5" class="form-control" placeholder="Latitude">
            </div>

            <div class="col-md-4">
                <input type="text" name="x6" class="form-control" placeholder="Longitude">
            </div>

            <div class="col-12 text-center">
                <button type="submit" class="btn btn-custom px-4">Предсказать</button>
            </div>
        </form>

        <hr>

        <div class="row text-center">
            <div class="col-md-6">
                <h5>📊 Предсказание</h5>
                <p class="fs-4 text-primary">{{ prediction }}</p>
            </div>

            <div class="col-md-6">
                <h5>📈 Точность модели</h5>
                <p class="fs-4 text-success">{{ score }}</p>
            </div>
        </div>

        <hr>

        <h4 class="mt-4">📉 График</h4>
        <div class="text-center">
            <img src="{{ url_for('static', filename='plot.png') }}" width="600">
        </div>

        <hr>

        <h4 class="mt-4">📋 Первые 5 строк датасета</h4>
        <div class="table-responsive">
            {{ table|safe }}
        </div>

    </div>

</div>

</body>
</html>
